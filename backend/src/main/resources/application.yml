spring:
  application:
    name: ott-finder

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/ottfinder}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}

tmdb:
  api-key: ${TMDB_API_KEY:}
  base-url: https://api.themoviedb.org/3
  image-base-url: https://image.tmdb.org/t/p/w500

firebase:
  credentials-path: ${FIREBASE_CREDENTIALS_PATH:./firebase-credentials.json}
  credentials-json: ${FIREBASE_CREDENTIALS_JSON:}
  enabled: ${FIREBASE_ENABLED:false}
  storage-bucket: ${FIREBASE_STORAGE_BUCKET:}

logging:
  level:
    com.ottfinder: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
